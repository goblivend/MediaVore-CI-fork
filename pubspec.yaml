name: mediavore
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.4.3
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  equatable: ^2.0.5
  get_it: ^7.6.7
  injectable: ^2.4.2
  cached_network_image: ^3.3.1
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.2
  intl: ^0.18.1
  share_plus: ^10.1.2
  file_picker: ^8.1.3
  app_links: ^6.3.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1
  reorderable_grid_view: ^2.2.8
  fl_chart: ^0.70.0
  scrollable_positioned_list: ^0.3.8
  rxdart: ^0.27.7
  archive: ^4.0.9
  csv: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  injectable_generator: ^2.4.2
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icon/
    - assets/achievements/
